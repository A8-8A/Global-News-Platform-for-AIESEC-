name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: https://aiesec-news.onrender.com
          VITE_AIESEC_CLIENT_ID: Z53eGho3_vtzFQ9ESdzND-V2Z8QDmHKqmhqeAv_PIpc
          VITE_AIESEC_AUTHORIZE_URL: https://auth.aiesec.org/oauth/authorize
          VITE_AIESEC_REDIRECT_URI: https://aiesec-news.web.app/auth/callback
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AIESEC_NEWS }}
          projectId: aiesec-news
          entryPoint: ./frontend