spring:
  application:
    name: aiesec-news-backend

  # Default profile is 'staging' for local development.
  # Render sets SPRING_PROFILES_ACTIVE=prod via env var.
  profiles:
    default: staging

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Neon free tier is modest; keep the pool small.
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate only validates that
      # entities match the migrated tables - it never alters them.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

# ---- Application-specific configuration ----
app:
  # CORS: which frontend origins may call this API.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://aiesec-news.web.app}

  # JWT: signs the session tokens WE issue (not AIESEC's tokens).
  jwt:
    secret: ${APP_JWT_SECRET}
    # Session lifetime in milliseconds (default 24h).
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

  # Posting rules from the spec.
  posting:
    max-posts-per-week: 2
    week-window-days: 7

  # AIESEC OAuth + GIS API endpoints. Values come from the
  # active profile (staging / prod) below.
  aiesec:
    client-id: ${AIESEC_CLIENT_ID}
    client-secret: ${AIESEC_CLIENT_SECRET}
    redirect-uri: ${AIESEC_REDIRECT_URI}

logging:
  level:
    org.aiesec.news: INFO
